<svg viewBox="0 0 1200 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="How Kata works: a pull request is screened at intake, scored in a scheduled round against the current king, and the winner is promoted to be the new king.">
  <defs>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1526"/>
      <stop offset="1" stop-color="#0a101f"/>
    </linearGradient>
    <radialGradient id="king" cx="0.5" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#153a2a"/>
      <stop offset="1" stop-color="#101b30"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .conn{stroke:url(#pipe);stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:2 11;animation:flow 1.1s linear infinite;}
      .loop{stroke:#f59e0b;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-dasharray:2 10;opacity:.75;animation:flowback 1.6s linear infinite;}
      .node{fill:#121d33;stroke:#2a3a5c;stroke-width:1.5;}
      .kingnode{fill:url(#king);stroke:#2f7d55;stroke-width:1.6;}
      .lab{fill:#e8eef8;font-size:22px;font-weight:600;}
      .sub{fill:#93a4c2;font-size:13px;}
      .kick{fill:#5f7599;font-size:13px;font-weight:600;letter-spacing:3px;}
      .aura{fill:#22c55e;opacity:.5;animation:glow 2.6s ease-in-out infinite;}
      .dot{fill:#e6f7ff;}
      .pill{fill:#0f1930;stroke:#26355a;stroke-width:1.2;}
      .pilltx{fill:#aeb9d3;font-size:12.5px;}
      .accent{opacity:.9;}
      @keyframes flow{to{stroke-dashoffset:-26;}}
      @keyframes flowback{to{stroke-dashoffset:24;}}
      @keyframes glow{0%,100%{opacity:.25;}50%{opacity:.6;}}
    </style>
  </defs>

  <rect x="8" y="8" width="1184" height="454" rx="20" fill="url(#card)" stroke="#1c2740"/>
  <text x="44" y="62" class="kick">KING OF THE HILL &#183; IN SCHEDULED ROUNDS</text>

  <!-- forward pipeline connectors -->
  <path class="conn" d="M 216 176 L 276 176"/>
  <path class="conn" d="M 452 176 L 512 176"/>
  <path class="conn" d="M 688 176 L 748 176"/>
  <path class="conn" d="M 924 176 L 984 176"/>
  <!-- travelling pulse -->
  <circle r="4.5" class="dot">
    <animateMotion dur="3.4s" repeatCount="indefinite"
      path="M 40 176 L 216 176 L 276 176 L 452 176 L 512 176 L 688 176 L 748 176 L 924 176 L 984 176 L 1160 176"/>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="3.4s" repeatCount="indefinite"/>
  </circle>

  <!-- stage 1: Pull Request -->
  <rect class="node" x="40" y="130" width="176" height="92" rx="16"/>
  <rect x="40" y="130" width="6" height="92" rx="3" fill="#3b82f6" class="accent"/>
  <text x="128" y="172" text-anchor="middle" class="lab">Pull Request</text>
  <text x="128" y="196" text-anchor="middle" class="sub">one agent bundle</text>

  <!-- stage 2: Intake -->
  <rect class="node" x="276" y="130" width="176" height="92" rx="16"/>
  <rect x="276" y="130" width="6" height="92" rx="3" fill="#38bdf8" class="accent"/>
  <text x="364" y="172" text-anchor="middle" class="lab">Intake</text>
  <text x="364" y="196" text-anchor="middle" class="sub">screen &#8594; kata:pending</text>

  <!-- stage 3: Round -->
  <rect class="node" x="512" y="130" width="176" height="92" rx="16"/>
  <rect x="512" y="130" width="6" height="92" rx="3" fill="#22d3ee" class="accent"/>
  <text x="600" y="172" text-anchor="middle" class="lab">Round</text>
  <text x="600" y="196" text-anchor="middle" class="sub">scheduled, secret problems</text>

  <!-- stage 4: Score -->
  <rect class="node" x="748" y="130" width="176" height="92" rx="16"/>
  <rect x="748" y="130" width="6" height="92" rx="3" fill="#34d399" class="accent"/>
  <text x="836" y="172" text-anchor="middle" class="lab">Score</text>
  <text x="836" y="196" text-anchor="middle" class="sub">king vs candidates</text>

  <!-- stage 5: New King -->
  <ellipse cx="1072" cy="176" rx="120" ry="70" class="aura" filter="url(#soft)"/>
  <rect class="kingnode" x="984" y="130" width="176" height="92" rx="16"/>
  <path d="M 1051 120 l 7 12 8 -14 8 14 7 -12 -3 20 -24 0 z" fill="#fbbf24"/>
  <text x="1072" y="174" text-anchor="middle" class="lab">New King</text>
  <text x="1072" y="197" text-anchor="middle" class="sub">merged &amp; promoted</text>

  <!-- return loop: the winner becomes the king to beat next round -->
  <path class="loop" d="M 1072 222 C 1072 322, 600 322, 600 222"/>
  <text x="836" y="308" text-anchor="middle" class="sub" fill="#c99a4a">re-scored as the king to beat, every round</text>

  <!-- the pieces -->
  <g>
    <rect class="pill" x="60" y="386" width="150" height="34" rx="17"/>
    <text x="135" y="408" text-anchor="middle" class="pilltx">kata &#183; engine</text>
    <rect class="pill" x="228" y="386" width="212" height="34" rx="17"/>
    <text x="334" y="408" text-anchor="middle" class="pilltx">kata-bot &#183; GitHub automation</text>
    <rect class="pill" x="458" y="386" width="186" height="34" rx="17"/>
    <text x="551" y="408" text-anchor="middle" class="pilltx">kata-sn60 &#183; subnet plugin</text>
    <rect class="pill" x="662" y="386" width="220" height="34" rx="17"/>
    <text x="772" y="408" text-anchor="middle" class="pilltx">kata-tee-runner &#183; sealed room</text>
    <rect class="pill" x="900" y="386" width="200" height="34" rx="17"/>
    <text x="1000" y="408" text-anchor="middle" class="pilltx">kata-board &#183; dashboard</text>
  </g>
</svg>
