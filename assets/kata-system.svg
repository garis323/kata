<svg viewBox="0 0 1200 555" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="The Kata workflow. Step 1: you open a pull request adding one agent. Step 2: kata-bot screens it at intake and labels it pending. Step 3: on a schedule kata-bot runs a round. Step 4: the kata engine scores the king against the candidates. Step 5: kata-bot merges and promotes the winner as the new king, which becomes the bar to beat next round. Inside a round, the kata engine loads a per-subnet plugin (SN60, SN22, and more), runs the king and candidates in the kata-tee-runner sealed room with miner-paid inference, and checks whether a candidate beats the king. kata-board shows the current king, the live round, and past winners.">
  <defs>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/><stop offset="0.55" stop-color="#22d3ee"/><stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1526"/><stop offset="1" stop-color="#0a101f"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#5b6b8c"/></marker>
    <style>
      .conn{stroke:url(#pipe);stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:2 11;animation:flow 1.1s linear infinite;}
      .loop{stroke:#f59e0b;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-dasharray:2 10;opacity:.8;animation:back 1.7s linear infinite;}
      .band{fill:#0e1a30;stroke:#2b6cb0;stroke-width:1.4;stroke-dasharray:7 7;animation:flow 6s linear infinite;}
      .node{fill:#121d33;stroke:#2a3a5c;stroke-width:1.5;}
      .svc{fill:#0f1930;stroke:#26355a;stroke-width:1.4;}
      .lab{fill:#e8eef8;font-size:18px;font-weight:600;}
      .det{fill:#93a4c2;font-size:12px;}
      .mlab{fill:#e8eef8;font-size:15px;font-weight:600;}
      .mdet{fill:#93a4c2;font-size:11px;}
      .num{fill:#ffffff;font-size:14px;font-weight:700;}
      .kick{fill:#5f7599;font-size:13px;font-weight:600;letter-spacing:3px;}
      .bt{fill:#7f9bc7;font-size:12.5px;font-weight:700;letter-spacing:2px;}
      .cap{fill:#7e8daa;font-size:12.5px;}
      .looptx{fill:#c99a4a;font-size:12.5px;}
      .aura{fill:#22c55e;animation:glow 2.6s ease-in-out infinite;}
      .dot{fill:#e6f7ff;}
      @keyframes flow{to{stroke-dashoffset:-26;}}
      @keyframes back{to{stroke-dashoffset:24;}}
      @keyframes glow{0%,100%{opacity:.2;}50%{opacity:.5;}}
    </style>
  </defs>

  <rect x="8" y="8" width="1184" height="539" rx="20" fill="url(#card)" stroke="#1c2740"/>
  <text x="44" y="50" class="kick">THE KATA WORKFLOW</text>

  <!-- return loop: new king becomes next round's bar -->
  <path class="loop" d="M 1052 100 C 1052 58, 600 58, 600 100" marker-end="url(#ah)"/>
  <text x="826" y="48" text-anchor="middle" class="looptx">the new king is next round's bar to beat</text>

  <!-- step connectors + travelling pulse -->
  <path class="conn" d="M 246 150 L 268 150" marker-end="url(#ah)"/>
  <path class="conn" d="M 472 150 L 494 150" marker-end="url(#ah)"/>
  <path class="conn" d="M 698 150 L 720 150" marker-end="url(#ah)"/>
  <path class="conn" d="M 924 150 L 946 150" marker-end="url(#ah)"/>
  <circle r="4.5" class="dot">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 50 150 L 246 150 L 268 150 L 472 150 L 494 150 L 698 150 L 720 150 L 924 150 L 946 150 L 1150 150"/>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- step 1 -->
  <rect class="node" x="50" y="100" width="196" height="100" rx="15"/>
  <rect x="50" y="100" width="5" height="100" rx="2.5" fill="#3b82f6"/>
  <circle cx="80" cy="128" r="13" fill="#3b82f6"/><text x="80" y="133" text-anchor="middle" class="num">1</text>
  <text x="148" y="158" text-anchor="middle" class="lab">Open PR</text>
  <text x="148" y="181" text-anchor="middle" class="det">you &#183; add one agent</text>

  <!-- step 2 -->
  <rect class="node" x="276" y="100" width="196" height="100" rx="15"/>
  <rect x="276" y="100" width="5" height="100" rx="2.5" fill="#38bdf8"/>
  <circle cx="306" cy="128" r="13" fill="#38bdf8"/><text x="306" y="133" text-anchor="middle" class="num">2</text>
  <text x="374" y="158" text-anchor="middle" class="lab">Intake</text>
  <text x="374" y="181" text-anchor="middle" class="det">kata-bot &#183; screen &#8594; pending</text>

  <!-- step 3 -->
  <rect class="node" x="502" y="100" width="196" height="100" rx="15"/>
  <rect x="502" y="100" width="5" height="100" rx="2.5" fill="#22d3ee"/>
  <circle cx="532" cy="128" r="13" fill="#22d3ee"/><text x="532" y="133" text-anchor="middle" class="num">3</text>
  <text x="600" y="158" text-anchor="middle" class="lab">Round</text>
  <text x="600" y="181" text-anchor="middle" class="det">kata-bot &#183; scheduled</text>

  <!-- step 4 -->
  <rect class="node" x="728" y="100" width="196" height="100" rx="15"/>
  <rect x="728" y="100" width="5" height="100" rx="2.5" fill="#2dd4bf"/>
  <circle cx="758" cy="128" r="13" fill="#2dd4bf"/><text x="758" y="133" text-anchor="middle" class="num">4</text>
  <text x="826" y="158" text-anchor="middle" class="lab">Score</text>
  <text x="826" y="181" text-anchor="middle" class="det">kata engine &#183; king vs candidates</text>

  <!-- step 5 -->
  <ellipse cx="1052" cy="150" rx="118" ry="62" class="aura" filter="url(#soft)"/>
  <rect class="node" x="954" y="100" width="196" height="100" rx="15" stroke="#2f7d55"/>
  <rect x="954" y="100" width="5" height="100" rx="2.5" fill="#22c55e"/>
  <path d="M 1031 92 l 7 12 8 -14 8 14 7 -12 -3 20 -24 0 z" fill="#fbbf24"/>
  <circle cx="984" cy="128" r="13" fill="#22c55e"/><text x="984" y="133" text-anchor="middle" class="num">5</text>
  <text x="1052" y="158" text-anchor="middle" class="lab">Promote</text>
  <text x="1052" y="181" text-anchor="middle" class="det">kata-bot &#183; merge &#8594; new king</text>

  <!-- zoom into step 4 -->
  <path class="conn" d="M 826 200 L 826 288" marker-end="url(#ah)"/>

  <rect class="band" x="120" y="288" width="960" height="150" rx="16"/>
  <text x="142" y="314" class="bt">INSIDE A ROUND &#183; ONE ENGINE, MANY SUBNETS</text>

  <path class="conn" d="M 356 374 L 378 374" marker-end="url(#ah)"/>
  <path class="conn" d="M 592 374 L 614 374" marker-end="url(#ah)"/>
  <path class="conn" d="M 828 374 L 850 374" marker-end="url(#ah)"/>

  <rect class="node" x="142" y="332" width="214" height="84" rx="13"/>
  <text x="249" y="368" text-anchor="middle" class="mlab">kata engine</text>
  <text x="249" y="390" text-anchor="middle" class="mdet">loads the subnet plugin</text>

  <rect class="node" x="378" y="332" width="214" height="84" rx="13"/>
  <text x="485" y="368" text-anchor="middle" class="mlab">SN60 &#183; SN22 &#183; +more</text>
  <text x="485" y="390" text-anchor="middle" class="mdet">per-subnet scoring rules</text>

  <rect class="node" x="614" y="332" width="214" height="84" rx="13"/>
  <text x="721" y="368" text-anchor="middle" class="mlab">kata-tee-runner</text>
  <text x="721" y="390" text-anchor="middle" class="mdet">sealed room &#183; miner-paid</text>

  <rect class="node" x="850" y="332" width="200" height="84" rx="13"/>
  <text x="950" y="368" text-anchor="middle" class="mlab">beats the king?</text>
  <text x="950" y="390" text-anchor="middle" class="mdet">rank, strictly greater</text>

  <!-- dashboard + caption -->
  <rect class="svc" x="44" y="466" width="224" height="34" rx="17"/>
  <text x="156" y="488" text-anchor="middle" class="mdet">kata-board &#183; dashboard</text>
  <text x="288" y="480" class="cap">shows the current king, the live round, and past winners.</text>
  <text x="288" y="504" class="cap">Each subnet keeps its own king in kings/&lt;target&gt;; the same engine and sealed room serve them all.</text>
</svg>
