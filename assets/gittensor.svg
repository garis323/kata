<svg viewBox="0 0 1200 210" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Built on Gittensor, the open-source software subnet on Bittensor (SN74). Win a round, become the king, and earn on-chain.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#152a63"/>
      <stop offset="0.5" stop-color="#2f6bff"/>
      <stop offset="1" stop-color="#4132c9"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8fb4ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8fb4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="b" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="9"/></filter>
    <style>
      .p{fill:#ffffff;opacity:.5;}
      .p1{animation:drift 7s ease-in-out infinite;}
      .p2{animation:drift 9s ease-in-out infinite 1s;}
      .p3{animation:drift 6s ease-in-out infinite .5s;}
      .p4{animation:drift 8s ease-in-out infinite 2s;}
      .p5{animation:drift 10s ease-in-out infinite 1.5s;}
      @keyframes drift{0%,100%{transform:translateY(0);opacity:.25;}50%{transform:translateY(-10px);opacity:.7;}}
      .chip{fill:#ffffff;fill-opacity:.12;stroke:#ffffff;stroke-opacity:.35;stroke-width:1;}
      .wm{fill:#ffffff;font-size:44px;font-weight:800;letter-spacing:.5px;}
      .chiptx{fill:#dbe6ff;font-size:13px;font-weight:700;letter-spacing:3px;}
      .tag{fill:#eaf1ff;font-size:19px;font-weight:500;}
      .ringdot{fill:#fde68a;}
    </style>
  </defs>

  <rect x="4" y="4" width="1192" height="202" rx="22" fill="url(#bg)"/>
  <ellipse cx="990" cy="105" rx="150" ry="120" fill="url(#halo)"/>
  <ellipse cx="120" cy="30" rx="220" ry="120" fill="#ffffff" opacity="0.05"/>

  <!-- floating particles -->
  <circle class="p p1" cx="360" cy="52" r="3"/>
  <circle class="p p2" cx="520" cy="150" r="2.5"/>
  <circle class="p p3" cx="700" cy="46" r="3.5"/>
  <circle class="p p4" cx="820" cy="168" r="2.5"/>
  <circle class="p p5" cx="1120" cy="150" r="3"/>

  <!-- wordmark -->
  <path d="M 66 66 l 26 0 -14 24 20 0 -34 46 8 -32 -18 0 z" fill="#fde68a"/>
  <text x="104" y="98" class="wm">Gittensor</text>
  <rect class="chip" x="106" y="116" width="236" height="30" rx="15"/>
  <text x="124" y="136" class="chiptx">BITTENSOR &#183; SUBNET 74</text>
  <text x="66" y="184" class="tag">Win a round, become the king, and earn on-chain.</text>

  <!-- rotating reward ring + crown -->
  <g>
    <circle cx="990" cy="105" r="62" fill="none" stroke="#fde68a" stroke-opacity=".9" stroke-width="3" stroke-dasharray="10 12">
      <animateTransform attributeName="transform" type="rotate" from="0 990 105" to="360 990 105" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="990" cy="105" r="46" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".25" stroke-width="1"/>
    <path d="M 958 118 l 0 -30 12 14 20 -26 20 26 12 -14 0 30 z" fill="#fde68a"/>
    <rect x="958" y="120" width="64" height="7" rx="2" fill="#fde68a"/>
    <circle class="ringdot" r="5">
      <animateMotion dur="16s" repeatCount="indefinite" path="M 990 43 A 62 62 0 1 1 989.9 43 Z"/>
    </circle>
  </g>
</svg>
