name: Feature
description: Request a website feature or behavior change.
labels: ["feature"]
body:
  - type: textarea
    id: request
    attributes:
      label: What should change?
      description: Describe the feature or behavior.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is this useful?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
