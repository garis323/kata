[build]
  command = "git fetch --unshallow || true && npm run build"
  ignore = "node scripts/netlify-ignore-build.js"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/wiki/*"
  to = "/wiki/:splat"
  status = 200

[[redirects]]
  from = "/api/warm"
  to = "/.netlify/functions/warm"
  status = 200

[build.environment]
  NODE_VERSION = "22"
  TAOPEDIA_ARTICLES_REF = "main"

[context.branch-deploy.environment]
  TAOPEDIA_ARTICLES_REF = "test"

[context.deploy-preview.environment]
  TAOPEDIA_ARTICLES_REF = "test"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pagefind's fragment/index/filter files are content-hashed (e.g.
# en_102b8b4.pf_fragment), so a given name's bytes never change — they can be
# cached immutably like the hashed /_astro assets. The top-level pagefind.js,
# pagefind-worker.js, pagefind-entry.json and wasm.*.pagefind have stable names
# and are intentionally left to revalidate so a Pagefind rebuild is picked up.
[[headers]]
  for = "/pagefind/fragment/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/pagefind/index/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/pagefind/filter/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# script-src needs 'wasm-unsafe-eval' because Pagefind (pagefind.js and
# pagefind-worker.js) compiles its search index with WebAssembly.instantiate;
# without it the CSP blocks the compile and search silently falls back to the
# metadata-only index, so queries matching article body text return nothing.
# Unlike 'unsafe-eval' it does not re-enable JS eval()/new Function().
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-Permitted-Cross-Domain-Policies = "none"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Permissions-Policy = "accelerometer=(), all-screens-capture=(), attribution-reporting=(), autoplay=(), bluetooth=(), browsing-topics=(), camera=(), captured-surface-control=(), clipboard-read=(), compute-pressure=(), deferred-fetch=(), deferred-fetch-minimal=(), display-capture=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(), gamepad=(), geolocation=(), gyroscope=(), hid=(), digital-credentials-get=(), identity-credentials-get=(), idle-detection=(), interest-cohort=(), keyboard-map=(), local-fonts=(), magnetometer=(), microphone=(), midi=(), otp-credentials=(), payment=(), picture-in-picture=(), private-state-token-issuance=(), private-state-token-redemption=(), publickey-credentials-create=(), publickey-credentials-get=(), screen-wake-lock=(), serial=(), speaker-selection=(), storage-access=(), usb=(), web-share=(), window-management=(), xr-spatial-tracking=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; object-src 'none'; media-src 'none'; manifest-src 'self'; img-src 'self' https: data:; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; connect-src 'self'; worker-src 'self'"
