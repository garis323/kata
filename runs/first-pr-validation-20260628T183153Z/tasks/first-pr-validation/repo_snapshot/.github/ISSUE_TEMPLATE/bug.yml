name: Bug
description: Report something broken on the Taopedia website.
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What is broken?
      description: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include page URLs, search terms, or actions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or context
